<ta-scenario-select data-scenarios="[{&quot;id&quot;:&quot;annwn-crossing&quot;,&quot;title&quot;:&quot;Annwn Crossing&quot;,&quot;description&quot;:&quot;The old stories say the Otherworld lies just beneath the skin of Wales. Tonight, on the Bwlch above Blaenrhondda, you discover they are not wrong. A figure in grey stands at the boundary stone where your grandmother vanished thirty years ago, and it is wearing her face. Dark mythological fantasy drawn from the Mabinogion, where the line between mortal land and the kingdom of Annwn dissolves with every step you take deeper into the hills.&quot;,&quot;genres&quot;:[&quot;fantasy&quot;,&quot;horror&quot;],&quot;difficulty&quot;:&quot;normal&quot;,&quot;players&quot;:&quot;1&quot;,&quot;featured&quot;:true,&quot;themes&quot;:[&quot;Welsh mythology&quot;,&quot;Annwn&quot;,&quot;folklore&quot;,&quot;family secrets&quot;,&quot;the Otherworld&quot;]},{&quot;id&quot;:&quot;last-candle-of-gwynedd&quot;,&quot;title&quot;:&quot;The Last Candle of Gwynedd&quot;,&quot;description&quot;:&quot;Gwynedd, November 1282. Llywelyn ap Gruffudd is dead at Cilmeri, and Wales is burning. You are a dispatch rider carrying a sealed letter from Dafydd ap Gruffudd to a name you do not know, in a town you have never visited. English patrols on every road. Snow coming down from Eryri. The letter is warm in your hand, and something inside it has been moving since Rhuddlan.&quot;,&quot;genres&quot;:[&quot;historical&quot;,&quot;mystery&quot;],&quot;difficulty&quot;:&quot;hard&quot;,&quot;players&quot;:&quot;1&quot;,&quot;themes&quot;:[&quot;medieval Wales&quot;,&quot;Welsh independence&quot;,&quot;Edwardian conquest&quot;,&quot;espionage&quot;,&quot;the supernatural edge of history&quot;]},{&quot;id&quot;:&quot;deep-below-dinorwic&quot;,&quot;title&quot;:&quot;Deep Below Dinorwic&quot;,&quot;description&quot;:&quot;The quarry closed in 1969 and the pumps stopped in 1971. Forty thousand tonnes of water have filled the lower galleries since then. Y
